name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run unit tests with race detection
        run: go test -race -v ./internal/... ./pkg/...

      - name: Run integration tests
        run: go test -race -v -timeout 120s ./test/integration/

      - name: Run chaos tests
        run: go test -race -v -timeout 120s ./test/chaos/

      - name: Run tests with coverage
        run: |
          go test -coverprofile=coverage.out ./internal/... ./pkg/...
          go tool cover -func=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        run: go build -v -ldflags "-s -w" -o bin/raft-node ./cmd/raft/

      - name: Build Docker image
        run: docker build -t raft-node:ci .
